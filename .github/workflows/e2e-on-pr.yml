name: E2E (on client PR)

# Runs the full Playwright suite on every PR to portfolio-client/main.
# Tests this PR's client branch against the current main of server and
# the current main of the tests repo.
#
# The actual workflow lives in portfolio-tests as a reusable workflow.
# This file just invokes it with the right refs.

on:
  pull_request:
    branches: [main]

jobs:
  e2e:
    uses: VeraV/portfolio-tests/.github/workflows/_e2e-reusable.yml@main
    with:
      tests-ref: main
      server-ref: main
      client-ref: ${{ github.head_ref }}
